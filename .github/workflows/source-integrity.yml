name: Source Integrity

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  verify-clean-source:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify source has no diff/conflict artifacts
        run: node scripts/verify-clean-source.mjs
